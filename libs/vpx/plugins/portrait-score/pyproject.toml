[project]
name = "vpx-portrait-score"
version = "0.3.0"
description = "Backward-compat shim — portrait.score has moved to momentscan"
requires-python = ">=3.10"
dependencies = [
    "momentscan",
    "vpx-sdk",
    "vpx-face-detect",
    "opencv-python",
]

[project.optional-dependencies]
aesthetic = [
    "torch>=2.0",
    "open-clip-torch>=2.24",
]
caption = [
    "torch>=2.0",
    "open-clip-torch>=2.24",
    "transformers>=4.30,<5",
]

# Entry point removed — momentscan now registers portrait.score directly

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vpx"]

[tool.uv.sources]
vpx-sdk = { workspace = true }
vpx-face-detect = { workspace = true }
momentscan = { workspace = true }
