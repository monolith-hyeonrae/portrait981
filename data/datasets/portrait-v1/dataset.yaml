name: portrait-v1
description: 981파크 portrait 데이터셋
version: "3.0"
created: "2026-03-18"

structure:
  images: "images/"
  labels: "labels.csv"

# 표정 (expression) — 셔터를 누를지 결정
expression:
  cheese: "이쁜 미소/웃음 🧀 — 얼굴이 주인공. 프로필 사진, 인물 초상화용"
  chill:  "쿨하고 여유로운 🧊 — 편안, 힘 빠진 느낌"
  edge:   "날카롭고 강렬한 🗡️ — 인상 찡그리는데 간지, 제임스딘"
  hype:   "카타르시스/환호 🔥 — 순간이 주인공. 역동적 액션, 에너지 폭발"

# cheese vs hype 구분:
#   cheese = 얼굴만 프로필로 쓰고 싶은 장면 → reportrait: 인물 초상화
#   hype   = 장면 포함 다이나믹을 표현하고 싶은 장면 → reportrait: 액션/배경 합성

# 포즈 (pose) — 독립 축
pose:
  front:  "정면"
  angle:  "3/4 앵글"
  side:   "측면"

# 기각
reject: "cut ✂️ — 이 장면은 찍으면 안 된다"

# 장면 (scene) — 탑승 구성
scene:
  solo: "1인 탑승"
  duo:  "2인 탑승"

# 케미스트리 (chemistry) — scene=duo일 때만
chemistry:
  sync: "함께 웃기, 동시 반응"
  interact: "서로 쳐다보기, 하이파이브"

# labels.csv 컬럼
columns:
  filename: "이미지 파일명"
  member_id: "인물 ID (비디오명 또는 고유 ID, 빈 값 허용)"
  expression: "표정 라벨 (cheese/chill/edge/hype, 빈 값 = 미지정)"
  pose: "포즈 라벨 (front/angle/side, 빈 값 = 미지정)"
  scene: "장면 라벨 (solo/duo, 빈 값 = 미지정)"
  chemistry: "케미 라벨 (sync/interact, scene=duo일 때만)"
  source: "reference = 참조 이미지, operational = 운용 프레임"
