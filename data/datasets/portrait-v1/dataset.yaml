name: portrait-v1
description: 981파크 portrait 데이터셋
version: "3.0"
created: "2026-03-18"

structure:
  images: "images/"
  labels: "labels.csv"

# 표정 (expression) — 셔터를 누를지 결정
expression:
  cheese: "밝은 미소/웃음 🧀"
  chill:  "쿨하고 여유로운 🧊"
  edge:   "날카롭고 강렬한 🗡️"
  hype:   "흥분/환호 🔥"

# 포즈 (pose) — 독립 축
pose:
  front:  "정면"
  angle:  "3/4 앵글"
  side:   "측면"

# 기각 (labels.csv에 포함되지 않음)
reject: "pass"

# labels.csv 컬럼
columns:
  filename: "이미지 파일명"
  member_id: "인물 ID (비디오명 또는 고유 ID, 빈 값 허용)"
  expression: "표정 라벨 (cheese/chill/edge/hype, 빈 값 = 미지정)"
  pose: "포즈 라벨 (front/angle/side, 빈 값 = 미지정)"
  source: "reference = 참조 이미지, operational = 운용 프레임"
