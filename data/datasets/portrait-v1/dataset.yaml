name: portrait-v1
description: 981파크 portrait 데이터셋 — 참조 이미지 + 운용 프레임 통합
version: "1.0"
created: "2026-03-18"

categories:
  - warm_smile      # 따뜻한 미소
  - cool_gaze       # 시크/무표정 (cool_expression)
  - lateral         # 측면 포즈
  - playful_face    # 장난스러운 표정
  - wild_energy     # 강렬한 에너지
