name: portrait-v1
description: 981파크 portrait 데이터셋
version: "4.0"
created: "2026-03-19"

structure:
  images: "images/"
  labels: "labels.csv"      # 프레임 단위 (변하는 것)
  videos: "videos.csv"      # 비디오 단위 (고정된 것)

# ── 비디오 단위 (videos.csv) ──
# 탑승 시작부터 끝까지 변하지 않는 상수
video_metadata:
  video_id: "비디오 식별자"
  scene: "solo = 1인 / duo = 2인"
  main_gender: "male / female"
  main_ethnicity: "asian / western / other"
  passenger_gender: "male / female (duo만)"
  passenger_ethnicity: "asian / western / other (duo만)"
  member_id: "인물 ID (재탑승 시 동일 ID 부여, 비워두기 가능)"
  notes: "비고"

# ── 프레임 단위 (labels.csv) ──
# 매 프레임마다 변하는 라벨

# 표정 (expression)
expression:
  cheese: "얼굴이 주인공 — 프로필 사진, 인물 초상화용 이쁜 미소"
  goofy:  "장난스러운 표정 😜 — 혀 내밀기, 윙크, 과장된 표정, 재미있는 개성"
  chill:  "쿨하고 여유로운 — 편안하고 힘 빠진 자연스러운 표정"
  edge:   "날카롭고 강렬한 — 인상 찡그리는데 간지나는 제임스딘"
  hype:   "순간이 주인공 — 역동적 액션, 에너지 폭발 카타르시스"
  occluded: "얼굴 가려짐 — 마스크/선글라스/목도리, 표정 판단 불가하지만 촬영 가치 있음"

# cheese vs hype 구분:
#   cheese = 얼굴만 프로필로 쓰고 싶은 장면 → reportrait: 인물 초상화
#   hype   = 장면 포함 다이나믹을 표현하고 싶은 장면 → reportrait: 액션/배경 합성

# occluded:
#   표정 signal(AU/emotion) 무의미 → pose/quality/segmentation 기반으로 촬영 판단
#   XGBoost가 parsing_coverage 등으로 자동 gating

# 포즈 (pose)
pose:
  front: "정면"
  angle: "3/4 앵글"
  side:  "측면"

# 기각
reject: "cut ✂️ — 이 장면은 찍으면 안 된다"

# 케미스트리 (chemistry) — scene=duo일 때만
chemistry:
  sync: "함께 웃기, 동시 반응 — 둘의 타이밍이 맞는 순간"
  interact: "서로 쳐다보기, 하이파이브 — 둘이 교감하는 순간"

# ── 설계 원칙 ──
# 비디오 상수는 videos.csv에 한번만 기록
# 프레임 라벨은 labels.csv에 프레임마다 기록
# video_id로 조인하여 비디오 context를 프레임에 연결
# XGBoost 학습 시: 45D signal + video context → 판단
