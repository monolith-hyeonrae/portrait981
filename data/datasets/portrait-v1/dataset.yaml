name: portrait-v1
description: 981파크 portrait 데이터셋
version: "2.0"
created: "2026-03-18"

# 표정 (expression) — 셔터를 누를지 결정
expression:
  cheese: "밝은 미소/웃음 🧀 — '치즈!' 하는 순간"
  chill:  "쿨하고 여유로운 🧊 — 편안, 힘 빠진 느낌"
  edge:   "날카롭고 강렬한 🗡️ — 인상 찡그리는데 간지, 제임스딘"
  hype:   "흥분/환호 🔥 — 놀이기구, 비명, 익사이팅"

# 포즈 (pose) — 표정 OK일 때만
pose:
  front:  "정면 — 카메라 직시"
  angle:  "3/4 앵글 — 약간 돌린"
  side:   "측면/프로필"

# 기각
reject:
  pass: "촬영 가치 없음 ⏭️"

# 라벨링 키
keybindings:
  expression: {1: cheese, 2: chill, 3: edge, 4: hype, 5: pass}
  pose: {q: front, w: angle, e: side}

notes: |
  라벨링 흐름:
    1단계: 표정 선택 (1-4) 또는 기각 (5=pass)
    2단계: 포즈 선택 (q/w/e) — pass 제외

  이미지 소스:
    - 인터넷 포트레이트 참조 이미지 (jpg, avif)
    - 981파크 운용 비디오 프레임 (label_tool → merge)
