[tool.uv.workspace]
members = [
    "libs/visualbase",
    "libs/visualbind",
    "libs/visualpath/core",
    "libs/visualpath/isolation",
    "libs/visualpath/cli",
    "libs/visualpath/pathway",
    "libs/vpx/plugins/face-detect",
    "libs/vpx/plugins/face-expression",
    "libs/vpx/plugins/body-pose",
    "libs/vpx/plugins/hand-gesture",
    "libs/vpx/plugins/face-au",
    "libs/vpx/plugins/head-pose",
    "libs/vpx/plugins/face-parse",
    "libs/vpx/sdk",
    "libs/vpx/runner",
    "libs/vpx/viz",
    "apps/momentscan",
    "apps/momentbank",
    "apps/reportrait",
    "apps/momentscan-report",
    "apps/portrait981",
    "apps/portrait981-serve",
    "apps/momentscan-plugins/frame-quality",
    "apps/momentscan-plugins/face-classify",
    "apps/momentscan-plugins/face-quality",
    "apps/momentscan-plugins/face-gate",
    "apps/momentscan-plugins/face-baseline",
    "apps/momentscan-plugins/frame-scoring",
    "apps/momentscan-plugins/portrait-score",
]

# Local development only: block CPU onnxruntime to prevent GPU .so overwrites.
# In production VenvWorker, each analyzer package installs in its own venv,
# so this override is unnecessary (package isolation resolves the conflict).
# macOS: onnxruntime allowed (CoreML EP for Apple Silicon acceleration)
[tool.uv]
dev-dependencies = [
    "momentscan[local,dev]",
]
override-dependencies = [
    "onnxruntime ; sys_platform != 'linux'",
]

[tool.uv.sources]
momentscan = { workspace = true }
momentbank = { workspace = true }
